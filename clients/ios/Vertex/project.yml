name: Vertex
options:
  bundleIdPrefix: ru.vertices
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: J698685529

packages:
  VertexCore:
    path: ../../shared/VertexCore

schemes:
  Vertex:
    build:
      targets:
        Vertex: all
        VertexTunnel: all
    run:
      config: Debug
      executable: Vertex
    archive:
      config: Release

targets:
  Vertex:
    type: application
    platform: iOS
    sources:
      - path: App
    dependencies:
      - target: VertexTunnel
        embed: true
        codeSign: true
      - package: VertexCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.vertices
        CODE_SIGN_ENTITLEMENTS: App/Vertex.entitlements
        INFOPLIST_FILE: App/Info.plist
        PRODUCT_NAME: Vertex
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "2.12.1"
        CURRENT_PROJECT_VERSION: "56"

  VertexTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: Tunnel
    dependencies:
      - package: VertexCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.vertices.tunnel
        CODE_SIGN_ENTITLEMENTS: Tunnel/Tunnel.entitlements
        INFOPLIST_FILE: Tunnel/Info.plist
        PRODUCT_NAME: VertexTunnel
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "2.12.1"
        CURRENT_PROJECT_VERSION: "56"
