# Vertex R3S-inline dnsmasq config.
# DHCP-only on eth1 (LAN-side). DNS-listener disabled (port=0) —
# downstream-router resolves directly to 1.1.1.1 via tunnel split-routing.
# R3S is DNS-neutral, just like the existing Mikrotik-mode R3S.
#
# Note: Ubuntu 24.04 ships systemd-resolved listening on 127.0.0.53:53.
# port=0 means dnsmasq does not touch port 53 → no conflict.
# install.sh will mask systemd-resolved separately to free /etc/resolv.conf.

# Bind only to eth1. `interface=eth1` + `bind-interfaces` means dnsmasq creates
# its DHCP socket bound to eth1 only; no need for `except-interface` lists.
interface=eth1
bind-interfaces

# DHCP pool — 150 leases is plenty for a home behind the downstream router
dhcp-range=192.168.42.50,192.168.42.200,12h
dhcp-option=3,192.168.42.1                  # default gateway = R3S
dhcp-option=6,1.1.1.1,1.0.0.1               # DNS = Cloudflare (resolved by client, routed through tunnel by dst-IP split)

# Disable own DNS listener — R3S does NOT resolve. Downstream queries 1.1.1.1 direct.
port=0

# Operational
log-dhcp
dhcp-authoritative
expand-hosts
